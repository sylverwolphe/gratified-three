<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratified — Invoices</title>
<link href="https://api.fontshare.com/v2/css?f[]=Satoshi@1,2&display=swap" rel="stylesheet">
<style>
/* ═══════════════════ TOKENS ═══════════════════ */
:root {
  --bg:         #FAF9F6;
  --surface:    #FFFFFF;
  --border:     #E7E2D8;
  --border-2:   #D9D2C3;
  --ink:        #24211D;
  --ink-soft:   #635C4D;
  --ink-dim:    #9C947F;
  --accent:     #722F37;
  --accent-soft:rgba(114,47,55,.07);
  --hi:         #C4501E;
  --good:       #4C6B4F;
  --radius:     5px;
  --font:       'Satoshi', system-ui, -apple-system, sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
button, input, select, textarea { font-family:inherit; }

body {
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  font-size:13px;
  -webkit-font-smoothing:antialiased;
}
::selection { background:var(--accent-soft); }
:focus-visible { outline:2px solid var(--accent); outline-offset:1px; }

/* ═══════════════════ HEADER ═══════════════════ */
.header {
  position:sticky; top:0; z-index:200;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  height:50px;
  display:flex; align-items:center; gap:14px;
}
.brand { display:flex; align-items:baseline; gap:6px; flex-shrink:0; cursor:pointer; }
.brand-mark {
  width:9px; height:9px; background:var(--accent);
  transform:rotate(45deg); flex-shrink:0;
}
.brand-name { font-size:14px; font-weight:700; letter-spacing:-.2px; color:var(--ink); }
.brand-sub  { font-size:11px; color:var(--ink-dim); }
.header-spacer { flex:1; }
.hstats { font-size:11.5px; color:var(--ink-dim); white-space:nowrap; }
.hstats strong { color:var(--ink-soft); font-weight:700; }

.btn {
  padding:6px 13px; font-size:12px; font-weight:700;
  letter-spacing:.2px; cursor:pointer; border:none; border-radius:var(--radius);
  transition:all .15s; white-space:nowrap;
}
.btn-primary { background:var(--ink); color:#fff; }
.btn-primary:hover { background:var(--accent); }
.btn-ghost { background:transparent; color:var(--ink-soft); border:1px solid var(--border-2); }
.btn-ghost:hover { border-color:var(--ink-soft); color:var(--ink); }
.btn-danger { background:transparent; color:var(--hi); border:1px solid var(--hi); }
.btn-danger:hover { background:var(--hi); color:#fff; }
.btn-sm { padding:4px 9px; font-size:11px; }

/* ═══════════════════ LAYOUT ═══════════════════ */
.wrap { max-width:900px; margin:0 auto; padding:22px 16px 60px; }
.section-head {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px; gap:10px; flex-wrap:wrap;
}
.section-title { font-size:18px; font-weight:700; letter-spacing:-.3px; }
.section-sub { font-size:12px; color:var(--ink-dim); margin-top:2px; }

/* ═══════════════════ INVOICE LIST ═══════════════════ */
.inv-grid { display:flex; flex-direction:column; gap:8px; }
.inv-card {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:12px 14px; display:flex; align-items:center; gap:14px;
  transition:border-color .15s, box-shadow .15s;
}
.inv-card:hover { border-color:var(--border-2); box-shadow:0 1px 4px rgba(36,33,29,.05); }
.inv-main { flex:1; min-width:0; cursor:pointer; }
.inv-customer { font-size:14px; font-weight:700; }
.inv-meta { font-size:11.5px; color:var(--ink-dim); margin-top:2px; display:flex; gap:8px; flex-wrap:wrap; }
.inv-slug {
  font-family:ui-monospace, monospace; font-size:10.5px;
  background:var(--accent-soft); color:var(--accent);
  padding:1px 6px; border-radius:8px; font-weight:600;
}
.inv-total { font-size:15px; font-weight:700; color:var(--ink); white-space:nowrap; }
.inv-actions { display:flex; gap:5px; flex-shrink:0; }
.empty-state {
  text-align:center; padding:50px 20px; color:var(--ink-dim);
  border:1px dashed var(--border-2); border-radius:8px; font-size:13px;
}

/* ═══════════════════ FORM ═══════════════════ */
.card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:18px; }
.f-label {
  font-size:10.5px; font-weight:700; color:var(--ink-dim);
  letter-spacing:.8px; text-transform:uppercase; margin-bottom:5px;
}
.f-hint { font-weight:500; text-transform:none; letter-spacing:0; opacity:.75; }
.f-input {
  width:100%; padding:7px 9px;
  border:1px solid var(--border-2);
  border-radius:var(--radius);
  background:var(--surface); font-size:13px;
  color:var(--ink); outline:none;
  transition:border-color .15s;
}
.f-input:focus { border-color:var(--accent); }
.f-row { display:grid; gap:10px; }
.f-row.r2 { grid-template-columns:1fr 1fr; }
.f-row.r3 { grid-template-columns:1.4fr 1fr 1fr; }
.f-group { display:flex; flex-direction:column; gap:14px; margin-bottom:18px; }
.f-block { display:flex; flex-direction:column; gap:6px; }
.f-slug-preview { font-size:11px; color:var(--ink-dim); margin-top:4px; }
.f-slug-preview code { font-family:ui-monospace,monospace; color:var(--accent); }

.subhead {
  font-size:12px; font-weight:700; color:var(--ink);
  display:flex; align-items:center; justify-content:space-between;
  padding-bottom:6px; border-bottom:1px solid var(--border); margin-bottom:10px;
}
.subhead .count { font-weight:500; color:var(--ink-dim); font-size:11px; }

.line-row {
  display:grid; grid-template-columns:1fr 1fr auto; gap:8px;
  align-items:center; margin-bottom:8px;
}
.line-row.hours { grid-template-columns:1fr 1fr 1fr auto; }
.line-row.expense { grid-template-columns:1.3fr .8fr .8fr auto auto; }
.line-x {
  width:26px; height:26px; border:1px solid var(--border-2); border-radius:var(--radius);
  background:transparent; color:var(--ink-dim); cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center; transition:all .12s;
}
.line-x:hover { border-color:var(--hi); color:var(--hi); }
.add-line-btn {
  background:none; border:1px dashed var(--border-2); border-radius:var(--radius);
  color:var(--ink-dim); font-size:11.5px; font-weight:600; cursor:pointer;
  padding:6px 10px; transition:all .12s; margin-top:2px;
}
.add-line-btn:hover { border-color:var(--accent); color:var(--accent); }

.receipt-input-wrap { position:relative; }
.receipt-file { font-size:11px; }
.receipt-thumb-mini {
  width:26px; height:26px; border-radius:4px; object-fit:cover;
  border:1px solid var(--border-2); cursor:pointer; flex-shrink:0;
}
.receipt-mini-empty {
  width:26px; height:26px; border-radius:4px; border:1px dashed var(--border-2);
  color:var(--ink-dim); font-size:9px; display:flex; align-items:center; justify-content:center;
}

.form-total-bar {
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 14px; background:var(--accent-soft); border-radius:var(--radius);
  margin-top:6px;
}
.form-total-bar .lbl { font-size:11px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.5px; }
.form-total-bar .amt { font-size:19px; font-weight:700; color:var(--accent); }

.form-actions { display:flex; justify-content:space-between; align-items:center; margin-top:18px; }
.slug-err { font-size:11px; color:var(--hi); font-weight:600; margin-top:4px; min-height:14px; }

/* ═══════════════════ INVOICE DOCUMENT (view/print) ═══════════════════ */
.doc-actions {
  display:flex; justify-content:flex-end; gap:8px; margin-bottom:14px;
}
.doc {
  background:var(--surface); border:1px solid var(--border); border-radius:8px;
  padding:40px 44px;
}
.doc-top { display:flex; justify-content:space-between; gap:20px; margin-bottom:30px; }
.doc-brand-name { font-size:20px; font-weight:700; letter-spacing:-.3px; display:flex; align-items:center; gap:8px; }
.doc-brand-addr { font-size:12px; color:var(--ink-dim); margin-top:6px; line-height:1.6; }
.doc-badge {
  text-align:right;
}
.doc-badge .label { font-size:10.5px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--ink-dim); }
.doc-badge .slugtag {
  font-family:ui-monospace,monospace; font-size:12px; color:var(--accent);
  background:var(--accent-soft); padding:2px 8px; border-radius:8px; margin-top:4px; display:inline-block;
}
.doc-badge .date { font-size:11.5px; color:var(--ink-dim); margin-top:6px; }

.doc-bill-to { margin-bottom:26px; }
.doc-bill-to .label { font-size:10.5px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--ink-dim); margin-bottom:4px; }
.doc-bill-to .name { font-size:14px; font-weight:700; }
.doc-bill-to .addr { font-size:12px; color:var(--ink-soft); white-space:pre-line; margin-top:2px; }

.doc-section { margin-bottom:22px; }
.doc-section-title {
  font-size:10.5px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  color:var(--ink-dim); padding-bottom:6px; border-bottom:1px solid var(--border); margin-bottom:8px;
}
.doc-line {
  display:flex; justify-content:space-between; gap:12px;
  padding:6px 0; font-size:13px; border-bottom:1px solid var(--bg);
}
.doc-line .l-main { flex:1; }
.doc-line .l-sub { font-size:11px; color:var(--ink-dim); }
.doc-line .l-amt { font-weight:600; white-space:nowrap; }
.doc-line .l-receipt {
  font-size:11px; color:var(--accent); cursor:pointer; text-decoration:underline; text-underline-offset:2px;
}

.doc-total-row {
  display:flex; justify-content:flex-end; align-items:center; gap:16px;
  padding-top:14px; margin-top:6px; border-top:2px solid var(--ink);
}
.doc-total-row .label { font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--ink-soft); }
.doc-total-row .amt { font-size:24px; font-weight:700; }

.doc-footer {
  margin-top:34px; padding-top:16px; border-top:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;
}
.doc-footer .q { font-size:11.5px; color:var(--ink-dim); }
.doc-footer .mail-link {
  font-size:11.5px; color:var(--accent); font-weight:600; cursor:pointer; text-decoration:none;
  border:1px solid var(--border-2); padding:3px 9px; border-radius:12px; transition:all .12s;
}
.doc-footer .mail-link:hover { border-color:var(--accent); background:var(--accent-soft); }
.copy-toast {
  font-size:10.5px; color:var(--good); font-weight:700; opacity:0; transition:opacity .2s;
}
.copy-toast.show { opacity:1; }

/* ═══════════════════ RECEIPT MODAL ═══════════════════ */
.backdrop {
  position:fixed; inset:0; z-index:500;
  background:rgba(36,33,29,.55);
  display:flex; align-items:center; justify-content:center;
  padding:20px; backdrop-filter:blur(2px);
}
.receipt-modal { max-width:min(600px,92vw); max-height:88vh; }
.receipt-modal img { max-width:100%; max-height:80vh; display:block; border-radius:6px; }
.receipt-modal-close {
  position:absolute; top:-14px; right:-14px; width:30px; height:30px; border-radius:50%;
  background:var(--ink); color:#fff; border:none; cursor:pointer; font-size:16px;
}

/* ═══════════════════ GATE ═══════════════════ */
.gate {
  position:fixed; inset:0; z-index:900;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.gate-card {
  width:100%; max-width:320px; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.gate-brand { display:flex; align-items:center; gap:8px; }
.gate-brand .brand-mark { width:11px; height:11px; }
.gate-brand span { font-size:19px; font-weight:700; letter-spacing:-.3px; }
.gate-sub { font-size:12.5px; color:var(--ink-dim); margin-bottom:4px; }
.gate-input {
  width:100%; padding:9px 11px;
  border:1px solid var(--border-2); border-radius:var(--radius);
  font-size:14px; text-align:center; letter-spacing:1px;
  background:var(--surface); color:var(--ink); outline:none;
  transition:border-color .15s;
}
.gate-input:focus { border-color:var(--accent); }
.gate-input.err { border-color:var(--hi); animation:shake .3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
.gate-btn { width:100%; padding:9px; }
.gate-err { font-size:11.5px; color:var(--hi); min-height:14px; font-weight:600; }
.gate-note { font-size:10.5px; color:var(--ink-dim); margin-top:2px; }

/* ═══════════════════ RESPONSIVE ═══════════════════ */
@media (max-width:640px) {
  .f-row.r2, .f-row.r3 { grid-template-columns:1fr; }
  .line-row, .line-row.hours, .line-row.expense { grid-template-columns:1fr; gap:6px; }
  .doc { padding:26px 18px; }
  .doc-top { flex-direction:column; gap:14px; }
  .doc-badge { text-align:left; }
}

/* ═══════════════════ PRINT ═══════════════════ */
@media print {
  .header, .doc-actions, .gate { display:none !important; }
  body { background:#fff; }
  .wrap { max-width:none; padding:0; }
  .doc { border:none; padding:0; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="brand" onclick="goList()">
    <div class="brand-mark"></div>
    <span class="brand-name">Gratified</span>
    <span class="brand-sub">invoice</span>
  </div>
  <div class="header-spacer"></div>
  <div class="hstats" id="stats"></div>
  <button class="btn btn-ghost btn-sm" onclick="lockApp()" title="Lock this device">Lock</button>
</header>

<div class="wrap" id="app"></div>

<!-- RECEIPT VIEW MODAL -->
<div class="backdrop" id="receipt-backdrop" style="display:none" onclick="receiptBackdropClick(event)">
  <div class="receipt-modal" style="position:relative">
    <button class="receipt-modal-close" onclick="closeReceiptModal()">×</button>
    <img id="receipt-modal-img" src="" alt="Receipt">
  </div>
</div>

<!-- GATE -->
<div class="gate" id="gate" style="display:flex">
  <div class="gate-card">
    <div class="gate-brand"><div class="brand-mark"></div><span>Gratified</span></div>
    <div class="gate-sub">This board is private.</div>
    <input id="gate-input" class="gate-input" type="password" placeholder="Password"
      autocomplete="off" onkeydown="if(event.key==='Enter')submitGate()">
    <div class="gate-err" id="gate-err"></div>
    <button class="btn btn-primary gate-btn" onclick="submitGate()">Enter</button>
    <div class="gate-note">You'll only be asked once on this device.</div>
  </div>
</div>

<script type="module">
import { initializeApp } from
  'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from
  'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

/* ──────── FIREBASE CONFIG (same project as tidy, separate ref) ──────── */
const firebaseConfig = {
  apiKey: "AIzaSyCX9LqCG0G_zLFIii3hYQYpA5Cz3vXO1m8",
  authDomain: "gratifiedwegrow.firebaseapp.com",
  databaseURL: "https://gratifiedwegrow-default-rtdb.firebaseio.com",
  projectId: "gratifiedwegrow",
  storageBucket: "gratifiedwegrow.firebasestorage.app",
  messagingSenderId: "620449599596",
  appId: "1:620449599596:web:4fcb7277f32cf636780849"
};

const app  = initializeApp(firebaseConfig);
const rtdb = getDatabase(app);
const stateRef = ref(rtdb, 'invoice-app/state');

/* ──────── CONSTANTS ──────── */
const GATE_WORD = 'rabbit';
const COMPANY = { name:'Gratified LLC', addr1:'2032 Cedar St', addr2:'Berkeley, CA 94709' };
const CONTACT_EMAIL = 'admin@gratified.com';
const EXPENSE_TYPES = ['supply','travel','equipment','food','venue','materials','other'];

/* ──────── SAFE DEVICE STORAGE ──────── */
const mem = {};
const store = {
  get(k){
    try { const v = localStorage.getItem(k);   if (v !== null) return v; } catch(e){}
    try { const v = sessionStorage.getItem(k); if (v !== null) return v; } catch(e){}
    return (k in mem) ? mem[k] : null;
  },
  set(k,v){
    try { localStorage.setItem(k,v);   return; } catch(e){}
    try { sessionStorage.setItem(k,v); return; } catch(e){}
    mem[k] = v;
  },
  del(k){
    try { localStorage.removeItem(k);   } catch(e){}
    try { sessionStorage.removeItem(k); } catch(e){}
    delete mem[k];
  }
};

/* ──────── STATE ──────── */
let db = { invoices:{}, order:[] };
let view = 'list';        // 'list' | 'create' | 'view'
let editId = null;        // when creating/editing
let viewId = null;        // when viewing/printing
let draft = null;         // in-progress form data
let syncStarted = false;

/* ──────── HELPERS ──────── */
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s='') {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function money(n) {
  n = Number(n)||0;
  return '$' + n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtFull(iso) { return iso ? new Date(iso).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : ''; }
function slugify(s) {
  return String(s||'').toLowerCase().trim()
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60);
}

function computeTotal(inv) {
  const svc = (inv.services||[]).reduce((s,x)=>s+(Number(x.price)||0),0);
  const hrs = (inv.hours||[]).reduce((s,x)=>s+((Number(x.hours)||0)*(Number(x.rate)||0)),0);
  const exp = (inv.expenses||[]).reduce((s,x)=>s+(Number(x.amount)||0),0);
  return svc + hrs + exp;
}

/* ──────── SYNC ──────── */
function startSync() {
  onValue(stateRef, snap => {
    const val = snap.val();
    db = (val && val.invoices) ? val : { invoices:{}, order:[] };
    if (!Array.isArray(db.order)) db.order = Object.keys(db.invoices||{});
    render();
  }, err => console.error('RTDB read error:', err));
}
async function save() {
  try { await set(stateRef, JSON.parse(JSON.stringify(db))); }
  catch (e) { console.error('RTDB write error:', e); }
}

/* ──────── ROUTING ──────── */
function slugFromLocation() {
  // supports /invoice/<slug>, /invoice/index.html#/<slug>, or ?slug=<slug>
  const hash = location.hash.replace(/^#\/?/, '').trim();
  if (hash) return hash;
  const params = new URLSearchParams(location.search);
  if (params.get('slug')) return params.get('slug');
  const parts = location.pathname.split('/').filter(Boolean);
  const i = parts.indexOf('invoice');
  if (i >= 0 && parts[i+1] && !parts[i+1].includes('.')) return parts[i+1];
  return null;
}
function invoiceLinkFor(slug) {
  const base = location.origin + location.pathname.replace(/index\.html$/,'').replace(/\/$/,'');
  return base + '/' + slug;
}

/* ──────── RENDER ROOT ──────── */
function render() {
  renderStats();
  if (view === 'list') renderList();
  else if (view === 'create') renderForm();
  else if (view === 'view') renderDoc();
}
function renderStats() {
  const all = Object.values(db.invoices||{});
  const total = all.reduce((s,i)=>s+computeTotal(i),0);
  document.getElementById('stats').innerHTML =
    all.length ? `<strong>${all.length}</strong> invoice${all.length===1?'':'s'} · <strong>${money(total)}</strong> total` : '';
}

window.goList = function () {
  view = 'list'; editId = null; viewId = null; draft = null;
  history.replaceState(null,'', location.pathname.replace(/#.*/,''));
  render();
};

/* ──────── LIST VIEW ──────── */
function renderList() {
  const app = document.getElementById('app');
  const order = (db.order||[]).filter(id => db.invoices[id]);
  const cards = order.map(id => {
    const inv = db.invoices[id];
    const t = computeTotal(inv);
    return `<div class="inv-card">
      <div class="inv-main" onclick="openView('${id}')">
        <div class="inv-customer">${esc(inv.customerName||'Untitled customer')}</div>
        <div class="inv-meta">
          <span class="inv-slug">/invoice/${esc(inv.slug)}</span>
          <span>${fmtFull(inv.createdAt)}</span>
        </div>
      </div>
      <div class="inv-total">${money(t)}</div>
      <div class="inv-actions">
        <button class="btn btn-ghost btn-sm" onclick="copyLink('${esc(inv.slug)}')">Copy link</button>
        <button class="btn btn-ghost btn-sm" onclick="openEdit('${id}')">Edit</button>
        <button class="btn btn-danger btn-sm" onclick="deleteInvoice('${id}')">Delete</button>
      </div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="section-head">
      <div>
        <div class="section-title">Invoices</div>
        <div class="section-sub">${COMPANY.name} · ${COMPANY.addr1}, ${COMPANY.addr2}</div>
      </div>
      <button class="btn btn-primary" onclick="openCreate()">+ New invoice</button>
    </div>
    ${order.length ? `<div class="inv-grid">${cards}</div>` : `<div class="empty-state">No invoices yet — create your first one above.</div>`}
  `;
}

window.copyLink = function (slug) {
  const link = invoiceLinkFor(slug);
  navigator.clipboard?.writeText(link).catch(()=>{});
  const el = document.getElementById('app');
  const toast = document.createElement('div');
  toast.textContent = 'Link copied: ' + link;
  toast.style.cssText = 'position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 16px;border-radius:20px;font-size:11.5px;z-index:600;';
  document.body.appendChild(toast);
  setTimeout(()=>toast.remove(), 1800);
};

window.deleteInvoice = function (id) {
  const inv = db.invoices[id]; if (!inv) return;
  if (!confirm(`Delete invoice for "${inv.customerName||'this customer'}"? This cannot be undone.`)) return;
  delete db.invoices[id];
  db.order = (db.order||[]).filter(x => x !== id);
  save(); render();
};

/* ──────── CREATE / EDIT FORM ──────── */
function blankDraft() {
  return {
    customerName:'', customerAddress:'', slug:'',
    services:[{id:uid(),name:'',price:''}],
    hours:[{id:uid(),hours:'',rate:''}],
    expenses:[{id:uid(),desc:'',type:'supply',amount:'',receipt:''}],
  };
}
window.openCreate = function () {
  editId = null; draft = blankDraft(); view = 'create'; render();
};
window.openEdit = function (id) {
  const inv = db.invoices[id]; if (!inv) return;
  editId = id;
  draft = JSON.parse(JSON.stringify(inv));
  if (!draft.services.length) draft.services = [{id:uid(),name:'',price:''}];
  if (!draft.hours.length)    draft.hours    = [{id:uid(),hours:'',rate:''}];
  if (!draft.expenses.length) draft.expenses = [{id:uid(),desc:'',type:'supply',amount:'',receipt:''}];
  view = 'create'; render();
};

function slugTaken(slug) {
  return Object.entries(db.invoices||{}).some(([id,inv]) => inv.slug === slug && id !== editId);
}

function renderForm() {
  const app = document.getElementById('app');
  const d = draft;
  const total = (d.services.reduce((s,x)=>s+(Number(x.price)||0),0)) +
                (d.hours.reduce((s,x)=>s+((Number(x.hours)||0)*(Number(x.rate)||0)),0)) +
                (d.expenses.reduce((s,x)=>s+(Number(x.amount)||0),0));

  const svcRows = d.services.map((s,i) => `
    <div class="line-row">
      <input class="f-input" placeholder="Service name" value="${esc(s.name)}" oninput="patchLine('services','${s.id}','name',this.value)">
      <input class="f-input" type="number" step="0.01" placeholder="Price" value="${esc(s.price)}" oninput="patchLine('services','${s.id}','price',this.value)">
      <button class="line-x" ${d.services.length<=1?'disabled':''} onclick="removeLine('services','${s.id}')" title="Remove">×</button>
    </div>`).join('');

  const hourRows = d.hours.map((h,i) => `
    <div class="line-row hours">
      <input class="f-input" placeholder="What for (optional)" value="${esc(h.label||'')}" oninput="patchLine('hours','${h.id}','label',this.value)">
      <input class="f-input" type="number" step="0.1" placeholder="Hours worked" value="${esc(h.hours)}" oninput="patchLine('hours','${h.id}','hours',this.value)">
      <input class="f-input" type="number" step="0.01" placeholder="Hourly rate" value="${esc(h.rate)}" oninput="patchLine('hours','${h.id}','rate',this.value)">
      <button class="line-x" ${d.hours.length<=1?'disabled':''} onclick="removeLine('hours','${h.id}')" title="Remove">×</button>
    </div>`).join('');

  const expRows = d.expenses.map((e,i) => `
    <div class="line-row expense">
      <input class="f-input" placeholder="Expense description" value="${esc(e.desc)}" oninput="patchLine('expenses','${e.id}','desc',this.value)">
      <select class="f-input" onchange="patchLine('expenses','${e.id}','type',this.value)">
        ${EXPENSE_TYPES.map(t=>`<option value="${t}" ${e.type===t?'selected':''}>${t}</option>`).join('')}
      </select>
      <input class="f-input" type="number" step="0.01" placeholder="Amount" value="${esc(e.amount)}" oninput="patchLine('expenses','${e.id}','amount',this.value)">
      <div class="receipt-input-wrap">
        <input type="file" accept="image/*" class="receipt-file" id="receipt-${e.id}" style="display:none" onchange="handleReceiptUpload('${e.id}',this.files[0])">
        ${e.receipt
          ? `<img class="receipt-thumb-mini" src="${e.receipt}" title="Click to view / replace" onclick="document.getElementById('receipt-${e.id}').click()">`
          : `<div class="receipt-mini-empty" title="Upload receipt" onclick="document.getElementById('receipt-${e.id}').click()" style="cursor:pointer">＋</div>`}
      </div>
      <button class="line-x" ${d.expenses.length<=1?'disabled':''} onclick="removeLine('expenses','${e.id}')" title="Remove">×</button>
    </div>`).join('');

  const slugPreview = d.slug ? invoiceLinkFor(d.slug).replace(/^https?:\/\//,'') : '';
  const slugError = d.slug && slugTaken(d.slug) ? 'That tag is already used by another invoice.' : '';

  app.innerHTML = `
    <div class="section-head">
      <div>
        <div class="section-title">${editId ? 'Edit invoice' : 'New invoice'}</div>
        <div class="section-sub">${COMPANY.name} · ${COMPANY.addr1}, ${COMPANY.addr2}</div>
      </div>
      <button class="btn btn-ghost" onclick="goList()">Cancel</button>
    </div>
    <div class="card">
      <div class="f-group">
        <div class="f-row r2">
          <div class="f-block">
            <div class="f-label">Customer name</div>
            <input class="f-input" value="${esc(d.customerName)}" oninput="patchField('customerName',this.value)" placeholder="Jane Doe">
          </div>
          <div class="f-block">
            <div class="f-label">Customer address</div>
            <input class="f-input" value="${esc(d.customerAddress)}" oninput="patchField('customerAddress',this.value)" placeholder="123 Main St, City, ST">
          </div>
        </div>
        <div class="f-block">
          <div class="f-label">Unique tag <span class="f-hint">— sets the address, e.g. gratified.com/invoice/wedding</span></div>
          <input class="f-input" value="${esc(d.slug)}" oninput="patchSlug(this.value)" placeholder="wedding">
          ${slugPreview ? `<div class="f-slug-preview"><code>${esc(slugPreview)}</code></div>` : ''}
          <div class="slug-err">${slugError}</div>
        </div>
      </div>

      <div class="f-group">
        <div class="subhead">Services <span class="count">${d.services.length} line${d.services.length===1?'':'s'}</span></div>
        ${svcRows}
        <button class="add-line-btn" onclick="addLine('services')">+ add service</button>
      </div>

      <div class="f-group">
        <div class="subhead">Hours worked <span class="count">${d.hours.length} line${d.hours.length===1?'':'s'}</span></div>
        ${hourRows}
        <button class="add-line-btn" onclick="addLine('hours')">+ add hours</button>
      </div>

      <div class="f-group">
        <div class="subhead">Expenses <span class="count">${d.expenses.length} line${d.expenses.length===1?'':'s'}</span></div>
        ${expRows}
        <button class="add-line-btn" onclick="addLine('expenses')">+ add expense</button>
      </div>

      <div class="form-total-bar">
        <span class="lbl">Total</span>
        <span class="amt">${money(total)}</span>
      </div>

      <div class="form-actions">
        <span></span>
        <button class="btn btn-primary" onclick="submitInvoice()">${editId ? 'Save changes' : 'Create invoice'}</button>
      </div>
    </div>
  `;
}

window.patchField = function (field, val) { draft[field] = val; };
window.patchSlug = function (val) { draft.slug = slugify(val); renderForm(); };
window.patchLine = function (group, id, field, val) {
  const row = draft[group].find(r => r.id === id);
  if (row) { row[field] = val; if (group !== 'services' || field !== 'name') { /* no full rerender needed for text fields */ }
    // re-render total bar cheaply by full re-render only on numeric fields affecting total
    if (['price','hours','rate','amount'].includes(field)) renderForm();
  }
};
window.addLine = function (group) {
  const blank = group==='services' ? {id:uid(),name:'',price:''}
              : group==='hours'    ? {id:uid(),label:'',hours:'',rate:''}
              : {id:uid(),desc:'',type:'supply',amount:'',receipt:''};
  draft[group].push(blank); renderForm();
};
window.removeLine = function (group, id) {
  if (draft[group].length <= 1) return;
  draft[group] = draft[group].filter(r => r.id !== id);
  renderForm();
};

window.handleReceiptUpload = function (expenseId, file) {
  if (!file) return;
  if (file.size > 4*1024*1024) { alert('That image is a bit large — try one under 4MB.'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    const row = draft.expenses.find(r => r.id === expenseId);
    if (row) { row.receipt = reader.result; renderForm(); }
  };
  reader.readAsDataURL(file);
};

window.submitInvoice = function () {
  const d = draft;
  if (!d.customerName.trim()) { alert('Add a customer name first.'); return; }
  if (!d.slug) { alert('Set a unique tag for this invoice (e.g. "wedding").'); return; }
  if (slugTaken(d.slug)) { alert('That tag is already used by another invoice — pick a different one.'); return; }

  const clean = {
    customerName: d.customerName.trim(),
    customerAddress: d.customerAddress.trim(),
    slug: d.slug,
    services: d.services.filter(s=>s.name.trim()||s.price).map(s=>({id:s.id,name:s.name.trim(),price:Number(s.price)||0})),
    hours: d.hours.filter(h=>h.hours||h.rate||h.label).map(h=>({id:h.id,label:(h.label||'').trim(),hours:Number(h.hours)||0,rate:Number(h.rate)||0})),
    expenses: d.expenses.filter(e=>e.desc.trim()||e.amount||e.receipt).map(e=>({id:e.id,desc:e.desc.trim(),type:e.type,amount:Number(e.amount)||0,receipt:e.receipt||''})),
  };

  if (editId) {
    clean.createdAt = db.invoices[editId].createdAt;
    db.invoices[editId] = clean;
    save(); openView(editId);
  } else {
    const id = uid();
    clean.createdAt = new Date().toISOString();
    db.invoices[id] = clean;
    db.order = [...(db.order||[]), id];
    save(); openView(id);
  }
};

/* ──────── VIEW / PRINT ──────── */
window.openView = function (id) {
  if (!db.invoices[id]) return;
  viewId = id; view = 'view';
  history.replaceState(null,'', '#/' + db.invoices[id].slug);
  render();
};
function openViewBySlug(slug) {
  const entry = Object.entries(db.invoices||{}).find(([id,inv]) => inv.slug === slug);
  if (entry) { viewId = entry[0]; view = 'view'; render(); return true; }
  return false;
}

function renderDoc() {
  const app = document.getElementById('app');
  const inv = db.invoices[viewId];
  if (!inv) { goList(); return; }
  const total = computeTotal(inv);

  const svcLines = (inv.services||[]).map(s => `
    <div class="doc-line">
      <div class="l-main">${esc(s.name||'Service')}</div>
      <div class="l-amt">${money(s.price)}</div>
    </div>`).join('');

  const hourLines = (inv.hours||[]).map(h => `
    <div class="doc-line">
      <div class="l-main">${esc(h.label) ? esc(h.label) : 'Hours worked'}<div class="l-sub">${h.hours} hr × ${money(h.rate)}/hr</div></div>
      <div class="l-amt">${money((Number(h.hours)||0)*(Number(h.rate)||0))}</div>
    </div>`).join('');

  const expLines = (inv.expenses||[]).map(e => `
    <div class="doc-line">
      <div class="l-main">${esc(e.desc||'Expense')}<div class="l-sub">${esc(e.type)}${e.receipt ? ` · <span class="l-receipt" onclick="openReceiptModal('${e.id}')">view receipt ↗</span>` : ''}</div></div>
      <div class="l-amt">${money(e.amount)}</div>
    </div>`).join('');

  app.innerHTML = `
    <div class="doc-actions">
      <button class="btn btn-ghost" onclick="goList()">← All invoices</button>
      <button class="btn btn-ghost" onclick="openEdit('${viewId}')">Edit</button>
      <button class="btn btn-primary" onclick="window.print()">Print / Save PDF</button>
    </div>
    <div class="doc" id="doc-print">
      <div class="doc-top">
        <div>
          <div class="doc-brand-name"><div class="brand-mark"></div>${COMPANY.name}</div>
          <div class="doc-brand-addr">${COMPANY.addr1}<br>${COMPANY.addr2}</div>
        </div>
        <div class="doc-badge">
          <div class="label">Invoice</div>
          <div class="slugtag">/invoice/${esc(inv.slug)}</div>
          <div class="date">${fmtFull(inv.createdAt)}</div>
        </div>
      </div>

      <div class="doc-bill-to">
        <div class="label">Bill to</div>
        <div class="name">${esc(inv.customerName)}</div>
        ${inv.customerAddress ? `<div class="addr">${esc(inv.customerAddress)}</div>` : ''}
      </div>

      ${svcLines ? `<div class="doc-section"><div class="doc-section-title">Services</div>${svcLines}</div>` : ''}
      ${hourLines ? `<div class="doc-section"><div class="doc-section-title">Hours worked</div>${hourLines}</div>` : ''}
      ${expLines ? `<div class="doc-section"><div class="doc-section-title">Expenses</div>${expLines}</div>` : ''}

      <div class="doc-total-row">
        <span class="label">Total</span>
        <span class="amt">${money(total)}</span>
      </div>

      <div class="doc-footer">
        <span class="q">Question?</span>
        <a class="mail-link" href="mailto:${CONTACT_EMAIL}" onclick="copyEmail(event)">${CONTACT_EMAIL} — click to open, or copy</a>
        <span class="copy-toast" id="email-toast">Copied</span>
      </div>
    </div>
  `;
}

window.copyEmail = function (e) {
  navigator.clipboard?.writeText(CONTACT_EMAIL).catch(()=>{});
  const t = document.getElementById('email-toast');
  if (t) { t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 1500); }
  // let the mailto: still fire naturally
};

window.openReceiptModal = function (expenseId) {
  const inv = db.invoices[viewId]; if (!inv) return;
  const e = (inv.expenses||[]).find(x => x.id === expenseId);
  if (!e || !e.receipt) return;
  document.getElementById('receipt-modal-img').src = e.receipt;
  document.getElementById('receipt-backdrop').style.display = 'flex';
};
window.closeReceiptModal = function () {
  document.getElementById('receipt-backdrop').style.display = 'none';
};
window.receiptBackdropClick = function (e) { if (e.target.id === 'receipt-backdrop') closeReceiptModal(); };

/* ──────── GATE ──────── */
function gateVisible() { return document.getElementById('gate').style.display !== 'none'; }
function revealApp() {
  document.getElementById('gate').style.display = 'none';
  if (!syncStarted) {
    syncStarted = true;
    onValue(stateRef, snap => {
      const val = snap.val();
      db = (val && val.invoices) ? val : { invoices:{}, order:[] };
      if (!Array.isArray(db.order)) db.order = Object.keys(db.invoices||{});
      // route to a slug if the URL asked for one, only on first load
      const slug = slugFromLocation();
      if (slug && view === 'list' && !viewId) {
        if (!openViewBySlug(slug)) render();
      } else {
        render();
      }
    }, err => console.error('RTDB read error:', err));
  }
}
window.submitGate = function () {
  const inp = document.getElementById('gate-input');
  const err = document.getElementById('gate-err');
  const v = (inp.value||'').trim().toLowerCase();
  if (v === GATE_WORD) { store.set('gate-ok', '1'); revealApp(); }
  else {
    err.textContent = 'Nope, try again.';
    inp.classList.remove('err'); void inp.offsetWidth; inp.classList.add('err');
    inp.value = ''; inp.focus();
  }
};
window.lockApp = function () { store.del('gate-ok'); location.reload(); };
function checkGate() {
  if (store.get('gate-ok') === '1') { revealApp(); }
  else { setTimeout(() => document.getElementById('gate-input')?.focus(), 60); }
}

/* ──────── INIT ──────── */
checkGate();
</script>
</body>
</html>
