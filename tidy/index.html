<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratified — Ops</title>
<link href="https://api.fontshare.com/v2/css?f[]=Satoshi@1,2&display=swap" rel="stylesheet">
<style>
/* ═══════════════════ TOKENS ═══════════════════ */
:root {
  --bg:         #FAF9F6;
  --surface:    #FFFFFF;
  --border:     #E7E2D8;
  --border-2:   #D9D2C3;
  --ink:        #24211D;
  --ink-soft:   #635C4D;
  --ink-dim:    #9C947F;
  --accent:     #722F37;
  --accent-soft:rgba(114,47,55,.07);
  --hi:         #C4501E;
  --med:        #B8792E;
  --lo:         #8C826A;
  --done-col:   #A79E8C;
  --radius:     5px;
  --font:       'Satoshi', system-ui, -apple-system, sans-serif;
}

/* ═══════════════════ RESET ═══════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
button, input, select, textarea { font-family:inherit; }

body {
  font-family:var(--font);
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  font-size:13px;
  -webkit-font-smoothing:antialiased;
}
::selection { background:var(--accent-soft); }
:focus-visible { outline:2px solid var(--accent); outline-offset:1px; }

/* ═══════════════════ HEADER ═══════════════════ */
.header {
  position:sticky; top:0; z-index:200;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  height:50px;
  display:flex; align-items:center; gap:14px;
}
.brand { display:flex; align-items:baseline; gap:6px; flex-shrink:0; }
.brand-mark {
  width:9px; height:9px; background:var(--accent);
  transform:rotate(45deg); flex-shrink:0;
}
.brand-name { font-size:14px; font-weight:700; letter-spacing:-.2px; color:var(--ink); }
.brand-sub  { font-size:11px; color:var(--ink-dim); }

.hcontrols { display:flex; gap:6px; align-items:center; flex:1; min-width:0; }
.ctrl {
  padding:5px 9px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  background:var(--surface);
  font-size:12px; color:var(--ink);
  outline:none; transition:border-color .15s;
  height:28px;
}
.ctrl:focus { border-color:var(--accent); }
.ctrl::placeholder { color:var(--ink-dim); }
input.ctrl  { width:180px; max-width:40vw; }
select.ctrl { cursor:pointer; color:var(--ink-soft); }
.search-wrap { position:relative; display:flex; align-items:center; }

.hstats {
  margin-left:auto; flex-shrink:0;
  font-size:11.5px; color:var(--ink-dim);
  white-space:nowrap; letter-spacing:.1px;
}
.hstats strong { color:var(--ink-soft); font-weight:700; }
.hstats .warn { color:var(--hi); font-weight:700; }

.lockbtn {
  flex-shrink:0; padding:4px 9px; font-size:11px; font-weight:600;
  border:1px solid var(--border); border-radius:var(--radius);
  background:var(--surface); color:var(--ink-soft); cursor:pointer;
  transition:all .12s;
}
.lockbtn:hover { border-color:var(--ink-soft); color:var(--ink); }

/* ═══════════════════ PROJECT BAR ═══════════════════ */
.projbar {
  display:flex; align-items:center; gap:6px;
  padding:7px 14px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  background:var(--bg); border-bottom:1px solid var(--border);
  position:sticky; top:50px; z-index:196;
  scrollbar-width:none;
}
.projbar::-webkit-scrollbar { display:none; }
.proj-pill {
  flex-shrink:0; display:flex; align-items:center; gap:6px;
  padding:5px 10px;
  border:1px solid var(--border); border-radius:6px;
  background:var(--surface);
  font-size:12.5px; font-weight:600; color:var(--ink-soft);
  cursor:pointer; white-space:nowrap; transition:all .15s;
}
.proj-pill:hover { border-color:var(--border-2); }
.proj-pill.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.proj-count { font-size:10.5px; font-weight:600; opacity:.55; font-variant-numeric:tabular-nums; }
.proj-pill.active .proj-count { opacity:.8; }
.proj-del {
  background:none; border:none; color:#fff; cursor:pointer;
  font-size:14px; line-height:1; padding:0 0 0 3px; opacity:.65;
}
.proj-del:hover { opacity:1; }
.proj-rename {
  border:none; outline:none; background:transparent; color:#fff;
  font-family:var(--font); font-size:12.5px; font-weight:600; width:140px;
}
.proj-pill.editing { background:var(--accent); border-color:var(--accent); }
.proj-add {
  flex-shrink:0; width:27px; height:27px;
  border:1px dashed var(--border-2); border-radius:6px;
  background:transparent; color:var(--ink-dim);
  font-size:16px; line-height:1; cursor:pointer;
  display:flex; align-items:center; justify-content:center; transition:all .12s;
}
.proj-add:hover { border-color:var(--accent); color:var(--accent); }

/* ═══════════════════ MOBILE TABS ═══════════════════ */
.tabbar {
  display:none;
  gap:6px; padding:8px 12px;
  overflow-x:auto; -webkit-overflow-scrolling:touch;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  position:sticky; top:91px; z-index:190;
  scrollbar-width:none;
}
.tabbar::-webkit-scrollbar { display:none; }
.tab-pill {
  flex-shrink:0;
  padding:5px 11px;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--surface);
  font-size:12px; font-weight:600; color:var(--ink-soft);
  cursor:pointer; white-space:nowrap;
  display:flex; align-items:center; gap:5px;
  transition:all .15s;
}
.tab-pill .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.tab-pill.active {
  background:var(--ink); border-color:var(--ink); color:#fff;
}
.tab-pill .n { opacity:.65; font-weight:500; }

/* ═══════════════════ BOARD ═══════════════════ */
.board {
  display:grid;
  grid-template-columns:repeat(6, minmax(150px,1fr));
  gap:1px;
  background:var(--border);
  border-top:1px solid var(--border);
}

.col {
  display:flex; flex-direction:column;
  background:var(--bg);
  max-height:calc(100vh - 92px);
  min-width:0;
}

.col-header {
  padding:10px 12px 8px;
  display:flex; align-items:center; gap:7px;
  flex-shrink:0;
}
.col-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.col-title {
  font-size:11.5px; font-weight:700; letter-spacing:.3px;
  color:var(--ink-soft);
  flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.col-count { font-size:11px; color:var(--ink-dim); font-variant-numeric:tabular-nums; }

.quick-add-row { padding:0 8px 8px; flex-shrink:0; }
.quick-add {
  width:100%; padding:5px 8px;
  background:transparent;
  border:1px dashed var(--border-2);
  border-radius:var(--radius);
  font-family:var(--font);
  font-size:12px; color:var(--ink);
  outline:none;
  transition:border-color .15s, background .15s, border-style .15s;
}
.quick-add::placeholder { color:var(--ink-dim); }
.quick-add:focus {
  border-color:var(--accent); border-style:solid;
  background:var(--surface);
}

.col-body {
  flex:1; overflow-y:auto;
  padding:0 8px 10px; display:flex; flex-direction:column; gap:6px;
  scrollbar-width:thin; scrollbar-color:var(--border-2) transparent;
}
.col.drop-target .col-body { background:var(--accent-soft); }

.col-empty {
  font-size:11.5px; color:var(--ink-dim);
  text-align:center; padding:16px 6px; opacity:.6;
}

/* ═══════════════════ TASK CARD ═══════════════════ */
.task {
  background:var(--surface);
  border:1px solid var(--border);
  border-left:3px solid var(--pri-color, var(--border));
  border-radius:var(--radius);
  padding:8px 9px 7px;
  position:relative;
  transition:border-color .15s, box-shadow .15s;
}
.task:hover { border-color:var(--border-2); box-shadow:0 1px 3px rgba(36,33,29,.06); }
.task.dragging { opacity:.35; }
.task.done .task-main-title { text-decoration:line-through; color:var(--ink-dim); }
.task.done { border-left-color:var(--done-col); }
.task.sub-target { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft); }

.task-top { display:flex; align-items:flex-start; gap:6px; }
.task-main { flex:1; min-width:0; cursor:pointer; }
.task-main-title {
  font-size:12.5px; font-weight:600; line-height:1.4;
  color:var(--ink); word-break:break-word;
}
.task-count-badge { font-size:10.5px; color:var(--ink-dim); font-weight:500; margin-left:4px; }
.task-desc {
  font-size:11px; color:var(--ink-dim);
  line-height:1.4; margin-top:2px;
  overflow:hidden; display:-webkit-box;
  -webkit-line-clamp:2; -webkit-box-orient:vertical;
}
.task-del {
  flex-shrink:0; width:16px; height:16px;
  display:flex; align-items:center; justify-content:center;
  background:none; border:none; cursor:pointer;
  color:var(--ink-dim); font-size:15px; line-height:1;
  opacity:0; transition:opacity .12s, color .12s;
  border-radius:3px;
}
.task:hover .task-del { opacity:.6; }
.task-del:hover { opacity:1 !important; color:var(--hi); background:var(--accent-soft); }

.task-footer {
  display:flex; align-items:center; flex-wrap:wrap; gap:5px;
  margin-top:6px;
}
.task-due {
  font-size:10.5px; color:var(--ink-dim); font-weight:500;
}
.task-due.overdue { color:var(--hi); font-weight:700; }
.task-label {
  font-size:10px; font-weight:600; letter-spacing:.2px;
  padding:1px 6px; border-radius:8px;
  background:var(--accent-soft); color:var(--accent);
}
.task-move { margin-left:auto; display:flex; gap:2px; opacity:0; transition:opacity .12s; }
.task:hover .task-move, .col-body:active .task-move { opacity:1; }
.mv-btn {
  width:17px; height:17px; border:1px solid var(--border);
  border-radius:3px; background:var(--surface);
  color:var(--ink-dim); font-size:10px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all .12s;
}
.mv-btn:hover { border-color:var(--accent); color:var(--accent); }
.mv-btn:disabled { opacity:.25; cursor:default; }
.mv-btn:disabled:hover { border-color:var(--border); color:var(--ink-dim); }

/* Subtasks — nested inline on card */
.subs { margin-top:6px; padding-left:9px; border-left:2px solid var(--border); display:flex; flex-direction:column; gap:1px; }
.sub-row { display:flex; align-items:center; gap:5px; padding:2px 0; }
.sub-check { width:11px; height:11px; accent-color:var(--accent); cursor:pointer; flex-shrink:0; }
.sub-text {
  flex:1; border:none; outline:none; background:transparent;
  font-family:var(--font); font-size:11px; color:var(--ink-soft);
  padding:1px 2px; min-width:0;
}
.sub-row.done .sub-text { text-decoration:line-through; color:var(--ink-dim); }
.sub-x {
  background:none; border:none; cursor:pointer; color:var(--ink-dim);
  font-size:12px; opacity:0; transition:opacity .12s; flex-shrink:0; line-height:1;
}
.sub-row:hover .sub-x { opacity:.7; }
.sub-x:hover { opacity:1 !important; color:var(--hi); }
.sub-more {
  font-size:10.5px; color:var(--ink-dim); background:none; border:none;
  cursor:pointer; text-align:left; padding:2px 0; font-weight:600;
}
.sub-more:hover { color:var(--accent); }
.sub-add {
  width:100%; border:none; outline:none; background:transparent;
  font-family:var(--font); font-size:11px; color:var(--ink-dim);
  padding:2px 2px 0; margin-top:1px;
}
.sub-add:focus { color:var(--ink); }
.sub-add::placeholder { color:var(--ink-dim); opacity:.7; }

/* ═══════════════════ BUTTONS ═══════════════════ */
.btn {
  padding:6px 13px; font-size:12px; font-weight:700;
  letter-spacing:.2px; cursor:pointer; border:none; border-radius:var(--radius);
  transition:all .15s;
}
.btn-primary { background:var(--ink); color:#fff; }
.btn-primary:hover { background:var(--accent); }
.btn-ghost { background:transparent; color:var(--ink-soft); border:1px solid var(--border); }
.btn-ghost:hover { border-color:var(--ink-soft); color:var(--ink); }
.btn-danger { background:transparent; color:var(--hi); border:1px solid var(--hi); }
.btn-danger:hover { background:var(--hi); color:#fff; }

/* ═══════════════════ MODAL ═══════════════════ */
.backdrop {
  position:fixed; inset:0; z-index:500;
  background:rgba(36,33,29,.4);
  display:flex; align-items:center; justify-content:center;
  padding:16px; backdrop-filter:blur(1.5px);
}
.modal {
  background:var(--surface);
  border:1px solid var(--border-2);
  border-radius:8px;
  width:100%; max-width:520px; max-height:88vh;
  overflow-y:auto;
  box-shadow:0 12px 40px rgba(36,33,29,.18);
  animation:modalIn .15s ease;
}
@keyframes modalIn { from{opacity:0;transform:translateY(6px) scale(.99)} to{opacity:1;transform:translateY(0) scale(1)} }

.modal-head {
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; background:var(--surface); z-index:10;
}
.modal-eyebrow {
  font-size:10.5px; font-weight:700; color:var(--ink-dim);
  letter-spacing:1px; text-transform:uppercase;
  display:flex; align-items:center; gap:6px;
}
.modal-close {
  background:none; border:none; cursor:pointer;
  color:var(--ink-dim); font-size:19px; line-height:1;
  padding:2px 5px; border-radius:4px; transition:all .12s;
}
.modal-close:hover { color:var(--ink); background:var(--bg); }

.modal-body { padding:16px; display:flex; flex-direction:column; gap:14px; }
.modal-foot {
  padding:11px 16px;
  border-top:1px solid var(--border);
  display:flex; justify-content:space-between; align-items:center;
  position:sticky; bottom:0; background:var(--surface); z-index:10;
}

.f-label {
  font-size:10.5px; font-weight:700; color:var(--ink-dim);
  letter-spacing:.8px; text-transform:uppercase; margin-bottom:5px;
}
.f-hint { font-weight:500; text-transform:none; letter-spacing:0; opacity:.75; }
.f-input {
  width:100%; padding:7px 9px;
  border:1px solid var(--border-2);
  border-radius:var(--radius);
  background:var(--surface); font-size:13px;
  color:var(--ink); outline:none;
  transition:border-color .15s;
}
.f-input:focus { border-color:var(--accent); }
.f-title { font-size:15px; font-weight:700; }
.f-desc  { min-height:68px; resize:vertical; font-size:12.5px; line-height:1.55; }
.f-row   { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.pri-group { display:flex; gap:5px; }
.pri-btn {
  flex:1; padding:6px 4px; font-size:11px; font-weight:700;
  border:1px solid var(--border-2); border-radius:var(--radius);
  background:transparent; color:var(--ink-soft);
  cursor:pointer; text-align:center; transition:all .15s;
  display:flex; align-items:center; justify-content:center; gap:5px;
}
.pri-btn .d { width:6px; height:6px; border-radius:50%; }
.pri-btn.on { color:#fff; }
.pri-btn.on[data-p="high"]   { background:var(--hi); border-color:var(--hi); }
.pri-btn.on[data-p="medium"] { background:var(--med); border-color:var(--med); }
.pri-btn.on[data-p="low"]    { background:var(--lo); border-color:var(--lo); }
.pri-btn.on .d { background:#fff; }

.label-group { display:flex; flex-wrap:wrap; gap:5px; }
.lbl-btn {
  padding:3px 10px; font-size:11px; font-weight:600;
  border:1px solid var(--border-2); border-radius:12px;
  background:transparent; color:var(--ink-dim); cursor:pointer;
  transition:all .12s;
}
.lbl-btn.on { background:var(--accent-soft); border-color:var(--accent); color:var(--accent); }

.meta-text { font-size:10.5px; color:var(--ink-dim); }

.sub-list { display:flex; flex-direction:column; margin-bottom:4px; }
.mrow { display:flex; align-items:center; gap:7px; padding:4px 0; border-bottom:1px solid var(--border); }
.mcheck { cursor:pointer; accent-color:var(--accent); width:13px; height:13px; flex-shrink:0; }
.mtitle {
  flex:1; border:none; outline:none;
  font-family:var(--font); font-size:12.5px; color:var(--ink);
  background:transparent; padding:1px 2px;
}
.mrow.done .mtitle { text-decoration:line-through; color:var(--ink-dim); }
.mdel {
  background:none; border:none; cursor:pointer;
  color:var(--ink-dim); font-size:14px; padding:0 2px; line-height:1;
  opacity:0; transition:opacity .1s;
}
.mrow:hover .mdel { opacity:1; }
.mdel:hover { color:var(--hi); }
.add-sub-btn {
  background:none; border:none; cursor:pointer;
  color:var(--ink-dim); font-size:11.5px; font-weight:600;
  padding:4px 0; transition:color .12s;
}
.add-sub-btn:hover { color:var(--accent); }

/* ═══════════════════ GATE ═══════════════════ */
.gate {
  position:fixed; inset:0; z-index:900;
  background:var(--bg);
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.gate-card {
  width:100%; max-width:320px; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.gate-brand { display:flex; align-items:center; gap:8px; }
.gate-brand .brand-mark { width:11px; height:11px; }
.gate-brand span { font-size:19px; font-weight:700; letter-spacing:-.3px; }
.gate-sub { font-size:12.5px; color:var(--ink-dim); margin-bottom:4px; }
.gate-input {
  width:100%; padding:9px 11px;
  border:1px solid var(--border-2); border-radius:var(--radius);
  font-size:14px; text-align:center; letter-spacing:1px;
  background:var(--surface); color:var(--ink); outline:none;
  transition:border-color .15s;
}
.gate-input:focus { border-color:var(--accent); }
.gate-input.err { border-color:var(--hi); animation:shake .3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
.gate-btn { width:100%; padding:9px; }
.gate-err { font-size:11.5px; color:var(--hi); min-height:14px; font-weight:600; }
.gate-note { font-size:10.5px; color:var(--ink-dim); margin-top:2px; }

/* ═══════════════════ RESPONSIVE ═══════════════════ */
@media (max-width: 860px) {
  .hcontrols input.ctrl { display:none; }
  .hcontrols select.ctrl { display:none; }
  .header { gap:8px; }
  .tabbar { display:flex; }

  .board {
    display:block; background:var(--bg); border-top:none;
  }
  .col {
    display:none;
    max-height:calc(100vh - 134px);
  }
  .col.active-mobile { display:flex; }
  .col-header { padding:10px 14px 6px; }
  .quick-add-row { padding:0 12px 8px; }
  .col-body { padding:0 12px 14px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="brand">
    <div class="brand-mark"></div>
    <span class="brand-name">Gratified</span>
    <span class="brand-sub">ops</span>
  </div>
  <div class="hcontrols">
    <div class="search-wrap">
      <input class="ctrl" id="search" type="text" placeholder="Search… ( / )" oninput="applyFilter()">
    </div>
    <select class="ctrl" id="filtPri" onchange="applyFilter()">
      <option value="">Priority</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
    <select class="ctrl" id="filtLabel" onchange="applyFilter()"></select>
  </div>
  <div class="hstats" id="stats"></div>
  <button class="lockbtn" onclick="lockApp()" title="Lock this device">Lock</button>
</header>

<!-- PROJECT BAR -->
<div class="projbar" id="projbar"></div>

<!-- MOBILE COLUMN TABS -->
<div class="tabbar" id="tabbar"></div>

<!-- BOARD -->
<div class="board" id="board"></div>

<!-- MODAL -->
<div class="backdrop" id="backdrop" style="display:none" onclick="backdropClick(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-eyebrow" id="modal-eyebrow">Task</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<!-- GATE -->
<div class="gate" id="gate" style="display:flex">
  <div class="gate-card">
    <div class="gate-brand"><div class="brand-mark"></div><span>Gratified</span></div>
    <div class="gate-sub">This board is private.</div>
    <input id="gate-input" class="gate-input" type="password" placeholder="Password"
      autocomplete="off" onkeydown="if(event.key==='Enter')submitGate()">
    <div class="gate-err" id="gate-err"></div>
    <button class="btn btn-primary gate-btn" onclick="submitGate()">Enter</button>
    <div class="gate-note">You'll only be asked once on this device.</div>
  </div>
</div>

<script type="module">
import { initializeApp } from
  'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, set, onValue } from

/* ──────── SAFE DEVICE STORAGE ──────── */
const mem = {};
const store = {
  get(k){
    try { const v = localStorage.getItem(k);   if (v !== null) return v; } catch(e){}
    try { const v = sessionStorage.getItem(k); if (v !== null) return v; } catch(e){}
    return (k in mem) ? mem[k] : null;
  },
  set(k,v){
    try { localStorage.setItem(k,v);   return; } catch(e){}
    try { sessionStorage.setItem(k,v); return; } catch(e){}
    mem[k] = v;
  },
  del(k){
    try { localStorage.removeItem(k);   } catch(e){}
    try { sessionStorage.removeItem(k); } catch(e){}
    delete mem[k];
  }
};

/* ──────── STATE ──────── */
let db = { projects:{}, projectOrder:[] };
let activeProject   = null;   // local / per-device
let openId          = null;
let drag            = null;
let subTarget       = null;
let flt             = { search:'', pri:'', label:'' };
let activeMobileCol = 'ideas';
let expandedSubs    = new Set();
let renamingPid     = null;
let syncStarted     = false;

/* ──────── PROJECT MODEL ──────── */
function makeProject(name) {
  return {
    id: uid(), name,
    tasks: {},
    columns: Object.fromEntries(COLS.map(c => [c.id, []])),
    createdAt: new Date().toISOString(),
  };
}
function activeProj() { return db.projects?.[activeProject] || null; }

/* Migrate/repair whatever comes back from Firebase into the projects shape. */
function normalize(val) {
  // Already in the new shape → just repair integrity.
  if (val && val.projects && Object.keys(val.projects).length) {
    val.projectOrder = Array.isArray(val.projectOrder) ? val.projectOrder : Object.keys(val.projects);
    Object.keys(val.projects).forEach(id => { if (!val.projectOrder.includes(id)) val.projectOrder.push(id); });
    val.projectOrder = val.projectOrder.filter(id => val.projects[id]);
    Object.values(val.projects).forEach(p => {
      p.tasks = p.tasks || {};
      p.columns = p.columns || {};
      COLS.forEach(c => { if (!Array.isArray(p.columns[c.id])) p.columns[c.id] = []; });
    });
    return { data: val, changed: false };
  }

  // Fresh build (first run, or migrating the old flat {tasks,columns} board).
  const projects = {}, order = [];
  const push = p => { projects[p.id] = p; order.push(p.id); };

  if (val && val.tasks && Object.keys(val.tasks).length) {
    const p = makeProject('General');
    p.tasks = val.tasks;
    p.columns = val.columns || p.columns;
    COLS.forEach(c => { if (!Array.isArray(p.columns[c.id])) p.columns[c.id] = []; });
    push(p);
  }
  SEED_PROJECTS.forEach(n => push(makeProject(n)));

  return { data: { projects, projectOrder: order }, changed: true };
}

/* ──────── SYNC ──────── */
function startSync() {
  onValue(stateRef, snap => {
    const { data, changed } = normalize(snap.val());
    db = data;
    if (!activeProject || !db.projects[activeProject]) {
      const saved = store.get('activeProject');
      activeProject = (saved && db.projects[saved]) ? saved : db.projectOrder[0];
    }
    populateLabelSel();
    render();
    if (changed) save();   // persist migration/seed once; won't loop (next read is already normalized)
  }, err => console.error('RTDB read error:', err));
}
async function save() {
  try { await set(stateRef, JSON.parse(JSON.stringify(db))); }
  catch (e) { console.error('RTDB write error:', e); }
}

/* ──────── FOCUS PRESERVATION (keeps you typing across re-renders) ──────── */
function cssEsc(s){ return (window.CSS && CSS.escape) ? CSS.escape(s) : String(s).replace(/["\\]/g,'\\$&'); }
function isTransientKey(k){ return k.startsWith('quick:') || k.startsWith('subadd:') || k.startsWith('rename:'); }
function captureFocus() {
  const el = document.activeElement;
  if (!el || !el.getAttribute) return null;
  const key = el.getAttribute('data-fkey');
  if (!key) return null;
  let start = null, end = null;
  try { start = el.selectionStart; end = el.selectionEnd; } catch(e){}
  const transient = isTransientKey(key);
  return { key, start, end, val: transient ? el.value : null, transient };
}
function restoreFocus(f) {
  if (!f) return;
  const el = document.querySelector(`[data-fkey="${cssEsc(f.key)}"]`);
  if (!el) return;
  if (f.transient && f.val != null && 'value' in el) el.value = f.val;
  el.focus();
  try {
    const len = (el.value || '').length;
    const s = f.start == null ? len : Math.min(f.start, len);
    const e = f.end   == null ? len : Math.min(f.end,   len);
    if (el.setSelectionRange) el.setSelectionRange(s, e);
  } catch(e){}
}

/* ──────── FILTER ──────── */
function populateLabelSel() {
  const sel = document.getElementById('filtLabel');
  if (!sel) return;
  const prev = sel.value;
  sel.innerHTML = '<option value="">Label</option>' +
    LABELS.map(l => `<option value="${l}">${l}</option>`).join('');
  sel.value = prev;
}
window.applyFilter = function () {
  flt.search = document.getElementById('search').value.toLowerCase();
  flt.pri    = document.getElementById('filtPri').value;
  flt.label  = document.getElementById('filtLabel').value;
  render();
};
function visible(t) {
  if (!t) return false;
  if (flt.search && !t.title.toLowerCase().includes(flt.search) &&
      !(t.description||'').toLowerCase().includes(flt.search)) return false;
  if (flt.pri   && t.priority !== flt.pri) return false;
  if (flt.label && !(t.labels||[]).includes(flt.label)) return false;
  return true;
}

/* ──────── RENDER ──────── */
function render() {
  const f = captureFocus();
  renderStats(); renderProjects(); renderTabs(); renderBoard();
  restoreFocus(f);
}

function renderStats() {
  const p = activeProj();
  const tasks = p ? Object.values(p.tasks||{}) : [];
  const total = tasks.length;
  const doneN = p ? (p.columns?.done||[]).length : 0;
  const activeN = p ? (p.columns?.inprogress||[]).length : 0;
  const now = new Date();
  const odN = tasks.filter(t =>
    t.dueDate && new Date(t.dueDate+'T00:00:00') < now && t.column !== 'done'
  ).length;
  document.getElementById('stats').innerHTML =
    `<strong>${total}</strong> tasks · <strong>${activeN}</strong> active · <strong>${doneN}</strong> done` +
    (odN ? ` · <span class="warn">${odN} overdue</span>` : '');
}

/* ──────── PROJECT BAR ──────── */
function renderProjects() {
  const bar = document.getElementById('projbar');
  if (!bar) return;
  const pills = (db.projectOrder||[]).map(pid => {
    const p = db.projects[pid];
    if (!p) return '';
    const active = pid === activeProject;
    const count = Object.keys(p.tasks||{}).length;
    if (renamingPid === pid) {
      return `<div class="proj-pill active editing">
        <input class="proj-rename" data-fkey="rename:${pid}" value="${esc(p.name)}"
          onkeydown="projRenameKey(event,'${pid}')" onblur="commitRename('${pid}',this.value)">
      </div>`;
    }
    return `<div class="proj-pill${active?' active':''}"
        onclick="switchProject('${pid}')" ondblclick="startRename('${pid}')"
        title="Click to open · double-click to rename">
      <span class="proj-name">${esc(p.name)}</span>
      <span class="proj-count">${count}</span>
      ${active && db.projectOrder.length > 1
        ? `<button class="proj-del" title="Delete project" onclick="event.stopPropagation();deleteProject('${pid}')">×</button>`
        : ''}
    </div>`;
  }).join('');
  bar.innerHTML = pills + `<button class="proj-add" title="New project" onclick="addProject()">+</button>`;
}

window.switchProject = function (pid) {
  if (!db.projects[pid]) return;
  activeProject = pid; store.set('activeProject', pid);
  activeMobileCol = COLS[0].id;
  render();
};
window.addProject = function () {
  const p = makeProject('New project');
  db.projects[p.id] = p;
  db.projectOrder.push(p.id);
  activeProject = p.id; store.set('activeProject', p.id);
  save(); render();
  setTimeout(() => startRename(p.id), 40);
};
window.startRename = function (pid) {
  renamingPid = pid; renderProjects();
  setTimeout(() => {
    const el = document.querySelector(`[data-fkey="rename:${pid}"]`);
    if (el) { el.focus(); el.select(); }
  }, 20);
};
window.projRenameKey = function (e, pid) {
  if (e.key === 'Enter') e.target.blur();
  else if (e.key === 'Escape') { renamingPid = null; renderProjects(); }
};
window.commitRename = function (pid, val) {
  const p = db.projects[pid];
  renamingPid = null;
  if (p) { val = (val||'').trim(); if (val && val !== p.name) { p.name = val; save(); } }
  render();
};
window.deleteProject = function (pid) {
  if (db.projectOrder.length <= 1) return;
  if (!confirm('Delete this project and everything in it?')) return;
  delete db.projects[pid];
  db.projectOrder = db.projectOrder.filter(x => x !== pid);
  if (activeProject === pid) {
    activeProject = db.projectOrder[0];
    store.set('activeProject', activeProject);
  }
  save(); render();
};

/* ──────── MOBILE COLUMN TABS ──────── */
function renderTabs() {
  const bar = document.getElementById('tabbar');
  if (!bar) return;
  const p = activeProj();
  if (!COLS.find(c=>c.id===activeMobileCol)) activeMobileCol = COLS[0].id;
  bar.innerHTML = COLS.map(c => {
    const n = p ? (p.columns?.[c.id]||[]).length : 0;
    return `<button class="tab-pill${c.id===activeMobileCol?' active':''}" onclick="setActiveTab('${c.id}')">
      <span class="dot" style="background:${c.id===activeMobileCol?'#fff':c.dot}"></span>${c.label}<span class="n">${n}</span>
    </button>`;
  }).join('');
}
window.setActiveTab = function (colId) {
  activeMobileCol = colId;
  renderTabs();
  document.querySelectorAll('.col').forEach(el => {
    el.classList.toggle('active-mobile', el.dataset.col === colId);
  });
};

/* ──────── BOARD ──────── */
function renderBoard() {
  const board = document.getElementById('board');
  if (!board) return;
  board.innerHTML = '';
  const p = activeProj();
  if (!p) return;
  COLS.forEach(col => board.appendChild(buildCol(col, p)));
  const activeEl = board.querySelector(`[data-col="${activeMobileCol}"]`);
  if (activeEl) activeEl.classList.add('active-mobile');
}

function buildCol(col, p) {
  const allIds = p.columns?.[col.id] || [];
  const visIds = allIds.filter(id => visible(p.tasks?.[id]));

  const wrap = document.createElement('div');
  wrap.className = 'col';
  wrap.dataset.col = col.id;

  wrap.addEventListener('dragover', e => {
    if (!drag) return;
    e.preventDefault();
    if (!subTarget) wrap.classList.add('drop-target');
  });
  wrap.addEventListener('dragleave', e => {
    if (!wrap.contains(e.relatedTarget)) wrap.classList.remove('drop-target');
  });
  wrap.addEventListener('drop', e => {
    e.preventDefault();
    wrap.classList.remove('drop-target');
    if (drag && !subTarget) { moveTask(drag.taskId, drag.colId, col.id); drag = null; }
  });

  const head = document.createElement('div');
  head.className = 'col-header';
  head.innerHTML =
    `<div class="col-dot" style="background:${col.dot}"></div>
     <span class="col-title">${col.label}</span>
     <span class="col-count">${allIds.length}</span>`;
  wrap.appendChild(head);

  const qrow = document.createElement('div');
  qrow.className = 'quick-add-row';
  const qi = document.createElement('input');
  qi.type = 'text';
  qi.className = 'quick-add';
  qi.placeholder = '+ task';
  qi.setAttribute('data-fkey', 'quick:' + col.id);
  qi.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const title = qi.value.trim();
      qi.value = '';                       // clear first, then add + re-focus
      if (title) quickAddTask(col.id, title);
    }
    if (e.key === 'Escape') { qi.value = ''; qi.blur(); }
  });
  qrow.appendChild(qi);
  wrap.appendChild(qrow);

  const body = document.createElement('div');
  body.className = 'col-body';
  if (visIds.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'col-empty';
    empty.textContent = (flt.search||flt.pri||flt.label) ? 'no matches' : 'nothing here — add one above';
    body.appendChild(empty);
  } else {
    visIds.forEach(id => { const c = buildCard(p.tasks[id], col); if (c) body.appendChild(c); });
  }
  wrap.appendChild(body);

  return wrap;
}

function buildCard(task, col) {
  if (!task) return null;
  const isDone  = task.column === 'done';
  const isOD    = !isDone && task.dueDate && new Date(task.dueDate+'T00:00:00') < new Date();
  const subs     = task.subtasks || [];
  const subsDone = subs.filter(s => s.done).length;
  const expanded = expandedSubs.has(task.id);
  const showSubs = expanded ? subs : subs.slice(0, SUB_COLLAPSE_AT);
  const hiddenN  = subs.length - showSubs.length;

  const idx = COLS.findIndex(c => c.id === task.column);
  const prevCol = COLS[idx-1], nextCol = COLS[idx+1];

  const card = document.createElement('div');
  card.className = 'task' + (isDone ? ' done' : '');
  card.style.setProperty('--pri-color', PRI_COLOR[task.priority] || 'transparent');
  card.dataset.task = task.id;
  card.draggable = true;

  const subRowsHtml = showSubs.map(s =>
    `<div class="sub-row${s.done?' done':''}" data-sub="${s.id}">
       <input type="checkbox" class="sub-check" ${s.done?'checked':''} onchange="toggleSubInline('${task.id}','${s.id}')">
       <input type="text" class="sub-text" data-fkey="sub:${task.id}:${s.id}" value="${esc(s.title)}"
         onblur="patchSubInline('${task.id}','${s.id}',this.value)"
         onkeydown="if(event.key==='Enter')this.blur()">
       <button class="sub-x" onclick="deleteSubInline('${task.id}','${s.id}')">×</button>
     </div>`
  ).join('');

  card.innerHTML =
    `<div class="task-top">
       <div class="task-main" data-open="${task.id}">
         <div class="task-main-title">${esc(task.title)}${subs.length?`<span class="task-count-badge">${subsDone}/${subs.length}</span>`:''}</div>
         ${task.description ? `<div class="task-desc">${esc(task.description)}</div>` : ''}
       </div>
       <button class="task-del" onclick="event.stopPropagation();deleteTask('${task.id}')">×</button>
     </div>
     <div class="subs" data-subs="${task.id}">
       ${subRowsHtml}
       ${hiddenN > 0 ? `<button class="sub-more" onclick="expandSubs('${task.id}')">+ ${hiddenN} more</button>` : ''}
       <input type="text" class="sub-add" data-fkey="subadd:${task.id}" placeholder="+ subtask"
         onkeydown="subAddKey(event,'${task.id}')">
     </div>
     <div class="task-footer">
       ${task.dueDate  ? `<span class="task-due${isOD?' overdue':''}">${fmtDate(task.dueDate)}</span>` : ''}
       ${(task.labels||[]).map(l=>`<span class="task-label">${l}</span>`).join('')}
       <div class="task-move">
         <button class="mv-btn" title="Move to ${prevCol?prevCol.label:''}" ${!prevCol?'disabled':''} onclick="event.stopPropagation();moveTask('${task.id}','${task.column}','${prevCol?prevCol.id:''}')">‹</button>
         <button class="mv-btn" title="Move to ${nextCol?nextCol.label:''}" ${!nextCol?'disabled':''} onclick="event.stopPropagation();moveTask('${task.id}','${task.column}','${nextCol?nextCol.id:''}')">›</button>
       </div>
     </div>`;

  card.querySelector('.task-main').onclick = () => openModal(task.id);

  card.addEventListener('dragstart', e => {
    drag = { taskId:task.id, colId:task.column };
    setTimeout(() => card.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    drag = null; clearSubTarget();
    document.querySelectorAll('.col').forEach(c => c.classList.remove('drop-target'));
  });
  card.addEventListener('dragover', e => {
    if (!drag || drag.taskId === task.id) return;
    e.preventDefault(); e.stopPropagation();
    document.querySelectorAll('.col').forEach(c => c.classList.remove('drop-target'));
    if (subTarget !== task.id) { clearSubTarget(); subTarget = task.id; card.classList.add('sub-target'); }
  });
  card.addEventListener('dragleave', e => {
    if (!card.contains(e.relatedTarget)) {
      card.classList.remove('sub-target');
      if (subTarget === task.id) subTarget = null;
    }
  });
  card.addEventListener('drop', e => {
    if (!drag || drag.taskId === task.id) return;
    e.preventDefault(); e.stopPropagation();
    card.classList.remove('sub-target'); subTarget = null;
    collapseToSub(task.id, drag.taskId); drag = null;
  });

  return card;
}

window.expandSubs = function (taskId) { expandedSubs.add(taskId); renderBoard(); };

function clearSubTarget() {
  if (subTarget) {
    document.querySelector(`[data-task="${subTarget}"]`)?.classList.remove('sub-target');
    subTarget = null;
  }
}

/* ──────── QUICK ADD ──────── */
function quickAddTask(colId, title) {
  const p = activeProj(); if (!p) return;
  const id = uid();
  p.tasks[id] = {
    id, title, description:'', priority:'medium',
    dueDate:'', labels:[], subtasks:[],
    column:colId, createdAt:new Date().toISOString(),
  };
  p.columns[colId] = [...(p.columns[colId]||[]), id];
  save(); render();   // render() re-focuses the (now empty) quick-add so you keep typing
}

/* ──────── COLLAPSE CARD → SUBTASK ──────── */
function collapseToSub(parentId, childId) {
  const p = activeProj(); if (!p) return;
  const parent = p.tasks?.[parentId];
  const child  = p.tasks?.[childId];
  if (!parent || !child) return;
  parent.subtasks = parent.subtasks || [];
  parent.subtasks.push({ id:uid(), title:child.title, done:false });
  p.columns[child.column] = (p.columns[child.column]||[]).filter(i => i !== childId);
  delete p.tasks[childId];
  expandedSubs.add(parentId);
  save(); render();
  if (openId === childId)  closeModal();
  if (openId === parentId) renderModal(parentId);
}

/* ──────── MOVE / DELETE ──────── */
function moveTask(taskId, from, to) {
  const p = activeProj(); if (!p) return;
  if (!to || from === to || !p.tasks?.[taskId]) return;
  p.tasks[taskId].column = to;
  p.columns[from] = (p.columns[from]||[]).filter(i => i !== taskId);
  p.columns[to]   = [...(p.columns[to]||[]), taskId];
  save(); render();
  if (openId === taskId) renderModal(taskId);
}
window.moveTask = moveTask;

window.deleteTask = function (taskId) {
  const p = activeProj(); if (!p) return;
  const col = p.tasks?.[taskId]?.column;
  if (!col) return;
  delete p.tasks[taskId];
  p.columns[col] = (p.columns[col]||[]).filter(i => i !== taskId);
  save(); render();
  if (openId === taskId) closeModal();
};

/* Move a task to a different project (keeps its column). */
window.moveTaskToProject = function (taskId, targetPid) {
  const src = activeProj(); if (!src) return;
  const t = src.tasks?.[taskId]; if (!t) return;
  const dst = db.projects[targetPid];
  if (!dst || targetPid === activeProject) return;
  const col = t.column;
  src.columns[col] = (src.columns[col]||[]).filter(i => i !== taskId);
  delete src.tasks[taskId];
  dst.tasks[taskId] = t;
  if (!Array.isArray(dst.columns[col])) dst.columns[col] = [];
  dst.columns[col] = [...dst.columns[col], taskId];
  save(); closeModal(); render();
};

/* ──────── INLINE SUBTASK OPS (on card) ──────── */
window.toggleSubInline = function (taskId, subId) {
  const p = activeProj(); const t = p?.tasks?.[taskId]; if (!t) return;
  const s = (t.subtasks||[]).find(x => x.id===subId);
  if (s) { s.done=!s.done; save(); renderBoard(); if (openId===taskId) renderModal(taskId); }
};
window.patchSubInline = function (taskId, subId, value) {
  const p = activeProj(); const t = p?.tasks?.[taskId]; if (!t) return;
  const s = (t.subtasks||[]).find(x => x.id===subId);
  if (s && s.title!==value) { s.title=value; save(); renderBoard(); if (openId===taskId) renderModal(taskId); }
};
window.deleteSubInline = function (taskId, subId) {
  const p = activeProj(); const t = p?.tasks?.[taskId]; if (!t) return;
  t.subtasks = (t.subtasks||[]).filter(x => x.id!==subId);
  save(); renderBoard(); if (openId===taskId) renderModal(taskId);
};
window.addSubInline = function (taskId, title) {
  title = (title||'').trim(); if (!title) return;
  const p = activeProj(); const t = p?.tasks?.[taskId]; if (!t) return;
  t.subtasks = t.subtasks||[];
  t.subtasks.push({ id:uid(), title, done:false });
  expandedSubs.add(taskId);
  save(); renderBoard(); if (openId===taskId) renderModal(taskId);
};
/* clear first, then add → the re-focused sub-add stays empty so you keep listing */
window.subAddKey = function (e, taskId) {
  if (e.key === 'Enter') {
    const v = e.target.value.trim();
    e.target.value = '';
    if (v) addSubInline(taskId, v);
  }
};

/* ──────── MODAL ──────── */
function openModal(taskId) {
  openId = taskId; renderModal(taskId);
  document.getElementById('backdrop').style.display = 'flex';
}
window.closeModal = function () {
  document.getElementById('backdrop').style.display = 'none'; openId = null;
};
window.backdropClick = function (e) { if (e.target.id === 'backdrop') closeModal(); };

function renderModal(taskId) {
  const p = activeProj();
  const t = p?.tasks?.[taskId];
  if (!t) return closeModal();
  const col = COLS.find(c => c.id === t.column) || COLS[0];

  document.getElementById('modal-eyebrow').innerHTML =
    `<div style="width:7px;height:7px;border-radius:50%;background:${col.dot}"></div>${col.label}`;

  const colOpts = COLS.map(c =>
    `<option value="${c.id}"${t.column===c.id?' selected':''}>${c.label}</option>`
  ).join('');

  const projOpts = db.projectOrder.map(pid =>
    `<option value="${pid}"${pid===activeProject?' selected':''}>${esc(db.projects[pid].name)}</option>`
  ).join('');

  const lblBtns = LABELS.map(l =>
    `<button class="lbl-btn${(t.labels||[]).includes(l)?' on':''}"
       onclick="toggleLabel('${taskId}','${l}')">${l}</button>`
  ).join('');

  const subHtml = (t.subtasks||[]).map(s =>
    `<div class="mrow${s.done?' done':''}" data-sub="${s.id}">
       <input type="checkbox" class="mcheck" ${s.done?'checked':''} onchange="toggleSub('${taskId}','${s.id}')">
       <input type="text" class="mtitle" value="${esc(s.title)}"
         onblur="patchSub('${taskId}','${s.id}',this.value)"
         onkeydown="if(event.key==='Enter')this.blur()">
       <button class="mdel" onclick="deleteSub('${taskId}','${s.id}')">×</button>
     </div>`
  ).join('');

  document.getElementById('modal-body').innerHTML =
    `<div>
       <div class="f-label">Title</div>
       <input class="f-input f-title" value="${esc(t.title)}"
         oninput="patchField('${taskId}','title',this.value)">
     </div>
     <div>
       <div class="f-label">Description</div>
       <textarea class="f-input f-desc"
         oninput="patchField('${taskId}','description',this.value)"
         placeholder="Notes, links, context…">${esc(t.description||'')}</textarea>
     </div>
     <div class="f-row">
       <div>
         <div class="f-label">Priority</div>
         <div class="pri-group">
           ${['high','medium','low'].map(pr =>
             `<button class="pri-btn${t.priority===pr?' on':''}" data-p="${pr}"
                onclick="setPri('${taskId}','${pr}')"><span class="d" style="background:${t.priority===pr?'#fff':PRI_COLOR[pr]}"></span>${pr==='medium'?'Med':pr[0].toUpperCase()+pr.slice(1)}</button>`
           ).join('')}
         </div>
       </div>
       <div>
         <div class="f-label">Due Date</div>
         <input class="f-input" type="date" value="${t.dueDate||''}"
           onchange="patchField('${taskId}','dueDate',this.value)">
       </div>
     </div>
     <div class="f-row">
       <div>
         <div class="f-label">Column</div>
         <select class="f-input" onchange="handleColChange('${taskId}',this.value)">${colOpts}</select>
       </div>
       <div>
         <div class="f-label">Project</div>
         <select class="f-input" onchange="handleProjChange('${taskId}',this.value)">${projOpts}</select>
       </div>
     </div>
     <div>
       <div class="f-label">Subtasks <span class="f-hint">— also editable right on the board</span></div>
       <div class="sub-list" id="sub-list-${taskId}">${subHtml}</div>
       <button class="add-sub-btn" onclick="addSub('${taskId}')">+ add subtask</button>
     </div>
     <div>
       <div class="f-label">Labels</div>
       <div class="label-group">${lblBtns}</div>
     </div>
     <div class="meta-text">Created ${fmtFull(t.createdAt)}</div>`;

  document.getElementById('modal-foot').innerHTML =
    `<button class="btn btn-danger"
       onclick="if(confirm('Delete this task?'))deleteTask('${taskId}')">Delete</button>
     <button class="btn btn-primary" onclick="closeModal()">Done</button>`;
}

window.patchField = function (taskId, field, value) {
  const p = activeProj(); const t = p?.tasks?.[taskId]; if (!t) return;
  t[field] = value; save(); renderStats(); renderProjects(); renderBoard();
};
window.setPri = function (taskId, pri) {
  const p = activeProj(); const t = p?.tasks?.[taskId]; if (!t) return;
  t.priority = pri; save(); renderBoard(); renderModal(taskId);
};
window.toggleLabel = function (taskId, label) {
  const p = activeProj(); const t = p?.tasks?.[taskId]; if (!t) return;
  t.labels = t.labels||[];
  const i = t.labels.indexOf(label);
  if (i>=0) t.labels.splice(i,1); else t.labels.push(label);
  save(); renderBoard(); renderModal(taskId);
};
window.handleColChange = function (taskId, newCol) {
  const p = activeProj(); const t = p?.tasks?.[taskId]; if (!t || t.column===newCol) return;
  moveTask(taskId, t.column, newCol);
};
window.handleProjChange = function (taskId, pid) {
  if (pid !== activeProject) moveTaskToProject(taskId, pid);
};

/* ──────── SUBTASK OPS (modal) ──────── */
window.addSub = function (taskId) {
  const p = activeProj(); const t = p?.tasks?.[taskId]; if (!t) return;
  t.subtasks = t.subtasks||[];
  t.subtasks.push({ id:uid(), title:'', done:false });
  expandedSubs.add(taskId);
  save(); renderModal(taskId);
  setTimeout(() => {
    const rows = document.querySelectorAll(`#sub-list-${taskId} .mtitle`);
    if (rows.length) rows[rows.length-1].focus();
  }, 30);
};
window.toggleSub = function (taskId, subId) { toggleSubInline(taskId, subId); };
window.patchSub  = function (taskId, subId, value) { patchSubInline(taskId, subId, value); };
window.deleteSub = function (taskId, subId) { deleteSubInline(taskId, subId); };

/* ──────── UTILS ──────── */
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function esc(s='') {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtFull(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}

/* ──────── GATE (cover password) ──────── */
function gateVisible() { return document.getElementById('gate').style.display !== 'none'; }
function revealApp() {
  document.getElementById('gate').style.display = 'none';
  if (!syncStarted) { syncStarted = true; startSync(); }
}
window.submitGate = function () {
  const inp = document.getElementById('gate-input');
  const err = document.getElementById('gate-err');
  const v = (inp.value||'').trim().toLowerCase();
  if (v === GATE_WORD) {
    store.set('gate-ok', '1');
    revealApp();
  } else {
    err.textContent = 'Nope, try again.';
    inp.classList.remove('err'); void inp.offsetWidth; inp.classList.add('err');
    inp.value = ''; inp.focus();
  }
};
window.lockApp = function () {
  store.del('gate-ok');
  location.reload();
};
function checkGate() {
  if (store.get('gate-ok') === '1') { revealApp(); }
  else { setTimeout(() => document.getElementById('gate-input')?.focus(), 60); }
}

/* ──────── KEYBOARD SHORTCUTS ──────── */
document.addEventListener('keydown', e => {
  if (gateVisible()) return;
  const tag = (document.activeElement?.tagName||'').toLowerCase();
  const typing = tag==='input' || tag==='textarea' || document.activeElement?.isContentEditable;
  if (typing) return;
  if (e.key === '/') { e.preventDefault(); document.getElementById('search')?.focus(); }
  if (e.key === 'c') {
    e.preventDefault();
    const el = document.querySelector(`[data-fkey="quick:${activeMobileCol}"]`) ||
               document.querySelector('.quick-add');
    el?.focus();
  }
  if (e.key === 'Escape') closeModal();
});

/* ──────── INIT ──────── */
populateLabelSel();
checkGate();   // shows the password cover, then starts the live board once unlocked
</script>
</body>
</html>
